name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install npm dependencies
      run: |
        npm ci || npm install

    - name: Install Capacitor CLI
      run: npm install -g @capacitor/cli @capacitor/android

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Sync Capacitor
      run: |
        npx cap sync android

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    # 🔑 Распаковка keystore из Secret
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/my-release-key.jks

    # 🔑 Создание gradle.properties с паролями
    - name: Create gradle.properties for signing
      run: |
        cat >> android/gradle.properties <<EOF
        RELEASE_STORE_FILE=my-release-key.jks
        RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
        RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
        EOF

    - name: Build Release APK with Gradle
      run: |
        cd android
        ./gradlew assembleRelease --stacktrace

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: squares-game-release-apk
        path: |
          android/app/build/outputs/apk/release/*.apk
        retention-days: 30
        if-no-files-found: warn
